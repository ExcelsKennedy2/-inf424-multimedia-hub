<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Lab | EduStream Multimedia Learning Hub</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* 🔄 1. LOADING SPINNER */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #ccc;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* 🧩 2. CARD HOVER TRANSITION */
        .card {
            width: 250px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin: 20px auto;
            text-align: center;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .card:hover {
            transform: scale(1.1);
            background-color: #e3f2fd;
        }

        /* ✏️ 3. SVG DRAW ANIMATION */
        .path {
            stroke: black;
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: draw 3s forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 🎨 4. SECOND SVG ANIMATION */
        .circle {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* 📷 CAMERA */
        video,
        canvas {
            width: 300px;
            display: block;
            margin: 10px auto;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">EduStream</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="audio-player.html">Audio Player</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="video-player.html">Video Player</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2 class="text-success text-center my-5">Creative Lab - CSS & SVG Animations</h2>

        <!-- 🔄 Spinner -->
        <div class="spinner"></div>

        <!-- 🧩 Card -->
        <div class="card">
            <h3>Hover Me</h3>
            <p>This card scales and changes color.</p>
        </div>

        <!-- ✏️ SVG Draw -->
        <svg width="300" height="150">
            <path class="path" d="M10 100 C 100 0, 200 200, 290 100" />
        </svg>

        <!-- 🎨 Second SVG -->
        <svg width="200" height="200">
            <circle class="circle" cx="50" cy="50" r="20" fill="blue" />
            <rect x="100" y="20" width="40" height="40" fill="red" />
            <circle cx="150" cy="150" r="20" fill="green" />
            <rect x="20" y="120" width="40" height="40" fill="purple" />
            <circle cx="100" cy="100" r="15" fill="orange" />
            <rect x="60" y="60" width="30" height="30" fill="pink" />
        </svg>

        <hr>

        <h2 class="text-success text-center my-5">Camera Filter</h2>
        <div class="justify-content-center text-center">
            <button class="btn btn-primary" onclick="startCamera()">Start Camera</button>
            <button class="btn btn-secondary" onclick="captureFrame()">Capture Frame</button>
            <button class="btn btn-secondary" onclick="applyGreyscale()">Greyscale</button>
            <button class="btn btn-secondary" onclick="downloadImage()">Download PNG</button>
            <p id="cameraStatus">Camera: Idle</p>
        </div>
    </div>



    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <script src="styles.js"></script>
    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const status = document.getElementById("cameraStatus");

        // 🎥 Start Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                status.textContent = "Camera: Started";
            } catch (error) {
                if (error.name === "NotAllowedError") {
                    status.textContent = "Error: Camera permission denied.";
                } else if (error.name === "NotFoundError") {
                    status.textContent = "Error: No camera found.";
                } else if (error.name === "NotReadableError") {
                    status.textContent = "Error: Camera is already in use.";
                } else {
                    status.textContent = "Error: Unknown issue.";
                }
            }
        }

        // 📸 Capture Frame
        function captureFrame() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            status.textContent = "Frame captured";
        }

        // 🎨 Greyscale Filter
        function applyGreyscale() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                const grey = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                data[i] = data[i + 1] = data[i + 2] = grey;
            }

            ctx.putImageData(imageData, 0, 0);
            status.textContent = "Greyscale applied";
        }

        // 💾 Download
        function downloadImage() {
            const link = document.createElement("a");
            link.download = "capture.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>

</body>

</html>
