<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery | EduStream Multimedia Learning Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">

<style>
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}

.media-card {
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.badge.video { background: blue; color: white; }
.badge.audio { background: green; color: white; }
.badge.image { background: orange; color: white; }

img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">EduStream</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="audio-player.html">Audio Player</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="animations.html">Animations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="video-player.html">Video Player</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container my-5">
<h2 class="text-success text-center">EduStream Media Gallery</h2>

<input class="form-control" type="text" id="search" placeholder="Search media...">

<div id="gallery" class="gallery card my-5"></div>
    </div>
        <footer class="bg-dark p-3">
        <p class="text-center text-white">Kennedy Ndung'u | INF 424</p>
    </footer>
<script>
const mediaLibrary = [
    {id:1,title:"Lecture Audio",type:"audio",thumbnail:"assets/images/academic.avif",duration:"3:00",description:"Audio lecture: A neatly arranged collection of books on a white wooden shelf, representing knowledge, learning resources, and academic study materials."},
    {id:2,title:"Tutorial Video",type:"video",thumbnail:"assets/images/poster.png",duration:"5:00",description:"Video tutorial"},
    {id:3,title:"Study Image",type:"image",thumbnail:"assets/images/academic image.avif",duration:null,description:"Image"},
    {id:4,title:"Animation Demo",type:"video",thumbnail:"assets/images/books-in-a-row.svg",duration:"2:30",description:"Animation:An SVG illustration depicting a variety of study books neatly arranged on a shelf, symbolizing the diverse learning resources available in the EduStream Multimedia Learning Hub."},
    {id:5,title:"Podcast",type:"audio",thumbnail:"assets/images/academic.avif",duration:"10:00",description:"Podcast"},
    {id:6,title:"Diagram",type:"image",thumbnail:"assets/images/books-in-a-row.svg",duration:null,description:"An SVG illustration depicting a variety of study books neatly arranged on a shelf, symbolizing the diverse learning resources available in the EduStream Multimedia Learning Hub."},
    {id:7,title:"Class Recording",type:"video",thumbnail:"assets/images/poster.png",duration:"7:00",description:"A neatly arranged collection of books on a white wooden shelf, representing knowledge, learning resources, and academic study materials."},
    {id:8,title:"Sound Clip",type:"audio",thumbnail:"assets/images/academic image.avif",duration:"1:20",description:"Clip"}
];

// PURE FUNCTION
function renderMediaCard(item){
    return `
    <div class="media-card" data-id="${item.id}" data-title="${item.title}" data-type="${item.type}">
        <img src="${item.thumbnail}" alt="${item.title}">
        <h3>${item.title}</h3>
        <span class="badge ${item.type}">${item.type}</span>
        <p>${item.duration ? item.duration : ""}</p>
        <button class="btn btn-primary">${item.type === "image" ? "View" : "Play"}</button>
    </div>`;
}

// Render
function displayMedia(data){
    document.getElementById("gallery").innerHTML = data.map(renderMediaCard).join("");
}

displayMedia(mediaLibrary);

// Search
document.getElementById("search").addEventListener("input", e=>{
    const filtered = mediaLibrary.filter(item =>
        item.title.toLowerCase().includes(e.target.value.toLowerCase())
    );
    displayMedia(filtered);
});

// Event Delegation
document.getElementById("gallery").addEventListener("click", e => {
    const card = e.target.closest(".media-card");
    if(card){
        alert(
            `ID: ${card.dataset.id}\nTitle: ${card.dataset.title}\nType: ${card.dataset.type}`
        );
    }
});
</script>

</body>
</html>
